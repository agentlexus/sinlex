<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Загрузка чертежа</title>
<style>
body{font-family:system-ui,sans-serif;margin:0;padding:20px;font-size:15px;color:#202124;max-width:520px}
h2{margin:0 0 12px;font-size:18px}
input[type=file]{display:block;margin:12px 0;max-width:100%}
button{background:#1a73e8;color:#fff;border:0;padding:12px 20px;border-radius:8px;
font-size:15px;font-weight:600;cursor:pointer}
</style></head><body>
<h2>Загрузка PDF — %%TITLE%%</h2>
<form method="POST" action="%%ACTION%%" enctype="multipart/form-data">
<input type="file" name="file" accept=".pdf,application/pdf" required>
<button type="submit">Загрузить на сервер</button>
</form>
</body></html>
