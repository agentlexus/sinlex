<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>3D</title>
<style>
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#fff}
#wrap{position:relative;width:100%;height:100%;min-height:400px}
#load{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;
  background:#fff;color:#555;font-family:sans-serif}
canvas{display:block}
</style></head>
<body>
<div id="wrap"><div id="load">Загрузка 3D-модели…</div></div>
<script type="importmap">
%%IMPORTMAP%%
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';

const wrap=document.getElementById('wrap');
const loadEl=document.getElementById('load');
const scene=new THREE.Scene();
scene.background=new THREE.Color(0xf5f5f5);
const camera=new THREE.PerspectiveCamera(45,1,0.0001,100000);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
wrap.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xffffff,1.5));
scene.add(new THREE.HemisphereLight(0xffffff,0x888888,0.6));
[[1,2,1],[-1,-0.5,-1],[0,1,-1]].forEach(p=>{
  const l=new THREE.DirectionalLight(0xffffff,0.9);l.position.set(...p);scene.add(l);
});
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.08;

function resize(){
  const w=wrap.clientWidth||800, h=wrap.clientHeight||400;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  renderer.setSize(w,h);
}
window.addEventListener('resize',resize);
resize();

function fitModel(model){
  model.traverse(n=>{
    if(n.isMesh){
      if(n.geometry && !n.geometry.attributes.normal) n.geometry.computeVertexNormals();
      n.material=new THREE.MeshStandardMaterial({color:0xb8b8b8,metalness:0.35,roughness:0.45,side:THREE.DoubleSide});
    }
  });
  const box=new THREE.Box3().setFromObject(model);
  if(box.isEmpty()) throw new Error('Пустая геометрия');
  const center=box.getCenter(new THREE.Vector3());
  const size=box.getSize(new THREE.Vector3());
  model.position.sub(center);
  const maxDim=Math.max(size.x,size.y,size.z,0.001);
  camera.position.set(maxDim*2.2,maxDim*1.6,maxDim*2.2);
  controls.target.set(0,0,0);
  controls.update();
  scene.add(model);
}

const loader=new GLTFLoader();
const glbUrl=%%GLB_URL_JSON%%;

window.addEventListener('error',e=>{
  loadEl.innerHTML='<span style="color:#c00">3D: '+(e.message||'ошибка загрузки')+'</span>';
});
window.addEventListener('unhandledrejection',e=>{
  loadEl.innerHTML='<span style="color:#c00">3D: '+(e.reason&&e.reason.message?e.reason.message:e.reason)+'</span>';
});

(async()=>{
  try{
    const res=await fetch(glbUrl);
    if(!res.ok){
      let msg='GLB HTTP '+res.status;
      try{const j=await res.clone().json();if(j.detail)msg=String(j.detail);}catch(_e){}
      throw new Error(msg);
    }
  const total=+res.headers.get('content-length')||0;
  const reader=res.body.getReader();
  const chunks=[];
  let loaded=0;
  while(true){
    const {done,value}=await reader.read();
    if(done) break;
    chunks.push(value);loaded+=value.length;
    if(total) loadEl.textContent='Загрузка: '+Math.round(100*loaded/total)+'%';
  }
  const buf=new Uint8Array(loaded);
  let off=0;for(const c of chunks){buf.set(c,off);off+=c.length;}
  const gltf=await new Promise((ok,no)=>loader.parse(buf.buffer,'',ok,no));
  loadEl.style.display='none';
  fitModel(gltf.scene);
  }catch(e){
    loadEl.innerHTML='<span style="color:#c00">3D: '+e.message+'</span>';
    console.error(e);
  }
})();

(function anim(){
  requestAnimationFrame(anim);
  controls.update();
  renderer.render(scene,camera);
})();
</script></body></html>
